const DATA={
  sun:{name:'El Sol',type:'Estrella',poem:`Arleth, eres como el Sol.\nNo porque seas lejana,\nsino porque todo a tu alrededor\nencuentra calor sin saber por qué.\nEres la razón por la que\ncada día vale la pena comenzar.`},
  mercury:{name:'Mercurio',type:'Planeta',poem:`Arleth, eres como Mercurio.\nRápida, brillante, imposible de ignorar.\nCuando pasas, el tiempo parece\ncorrer diferente,\ncomo si el universo supiera\nque algo extraordinario acaba de cruzar.`},
  venus:{name:'Venus',type:'Planeta del Amor',poem:`Arleth, eres como Venus.\nLa primera en aparecer cada noche\ny la última en desvanecerse.\nNo necesitas el sol para brillar,\ntu propia luz es suficiente\npara guiar a quien sabe mirarte.`},
  earth:{name:'La Tierra',type:'Nuestro Hogar',poem:`Arleth, eres como la Tierra.\nEl único lugar en todo el universo\ndonde todo tiene vida y sentido.\nContigo, cualquier lugar\nse convierte en hogar,\ncualquier momento, en eterno.`},
  mars:{name:'Marte',type:'Planeta Rojo',poem:`Arleth, eres como Marte.\nIntensa, apasionada, llena de misterio.\nHay en ti mundos que todavía\nnadie ha tenido el privilegio de conocer,\ny yo quisiera ser\nel primero en explorarlos todos.`},
  jupiter:{name:'Júpiter',type:'Gigante Gaseoso',poem:`Arleth, eres como Júpiter.\nGrande en presencia, grande en alma,\ncapaz de proteger con su fuerza\na quienes orbitan cerca de ti.\nCon solo estar, cambias\nla gravedad de todo lo que te rodea.`},
  saturn:{name:'Saturno',type:'Señor de los Anillos',poem:`Arleth, eres como Saturno.\nTienes algo que ninguna otra tiene:\nesos anillos invisibles que llevas,\nhecha de detalles únicos\nque te hacen diferente\na cualquier cosa que exista en este cosmos.`},
  uranus:{name:'Urano',type:'Gigante de Hielo',poem:`Arleth, eres como Urano.\nDistinta, inesperada, única en tu manera de ser.\nMientras los demás siguen la norma,\ntú giras a tu propio ritmo\ny en esa diferencia\nes donde está toda tu magia.`},
  neptune:{name:'Neptuno',type:'Planeta Azul',poem:`Arleth, eres como Neptuno.\nProfunda, serena, llena de corrientes\nque pocos se atreven a sentir.\nHay en ti una intensidad tranquila\nque solo descubre quien\ntiene el valor de acercarse.`},
  star1:{name:'Alfa Centauri',type:'Estrella Cercana',poem:`Arleth, eres como Alfa Centauri.\nLa estrella más cercana al corazón.\nNo importa la distancia que haya,\nsiempre que levanto los ojos\neres tú la primera\nen la que pienso.`},
  star2:{name:'Sirius',type:'Estrella más Brillante',poem:`Arleth, brillas como Sirius.\nLa más brillante de todo el cielo,\nno porque lo intentes,\nsino porque es lo que eres.\nCuando entras a un lugar,\ntodo lo demás palidece.`},
  star3:{name:'Betelgeuse',type:'Supergigante Roja',poem:`Arleth, eres como Betelgeuse.\nInmensa, ardiente, imposible de ignorar.\nHay en ti una energía tan grande\nque el universo entero\nse detiene a mirarte\ncada vez que decides brillar.`},
  blackhole:{name:'El Agujero Negro',type:'Singularidad del Cosmos',poem:`Arleth, eres como un agujero negro.\nNo porque destruyas,\nsino porque tienes una gravedad\ntan tuya, tan única,\nque quien se acerca\nno puede evitar quedarse.\nDoblas el tiempo cuando sonríes,\ny en tu luz, el universo entero\nencuentra su centro.`},
  pillars:{name:'Los Pilares de la Creación',type:'Nebulosa del Águila',poem:`Arleth, eres como los Pilares de la Creación.\nHecha de polvo de estrellas y tiempo,\nde esa materia antigua\nde la que nacen los soles.\nDentro de ti\nhay mundos enteros por nacer,\nvidas que aún no han comenzado\na brillar.\nEres el origen de todo\nlo que vale la pena en este cosmos.`}
};

let SHOOTING=[];
let nextShootIn=60;
function spawnShootingStar(W,H){
  const fromLeft=Math.random()<0.5;
  const y0=Math.random()*H*0.55;
  const x0=fromLeft?-20:W+20;
  const ang=fromLeft?(Math.random()*0.4+0.15):(Math.PI-(Math.random()*0.4+0.15));
  SHOOTING.push({x:x0,y:y0,vx:Math.cos(ang)*(Math.random()*4+6),vy:Math.sin(ang)*(Math.random()*4+6),life:0,maxLife:Math.random()*22+34,len:Math.random()*60+50});
}
function drawShootingStars(tctx,W,H){
  nextShootIn--;
  if(nextShootIn<=0){spawnShootingStar(W,H);nextShootIn=180;}
  SHOOTING=SHOOTING.filter(s=>s.life<s.maxLife&&s.x>-80&&s.x<W+80&&s.y>-80&&s.y<H+80);
  SHOOTING.forEach(s=>{
    s.x+=s.vx;s.y+=s.vy;s.life++;
    const fade=1-Math.max(0,(s.life-s.maxLife*.6))/(s.maxLife*.4);
    const ang=Math.atan2(s.vy,s.vx);
    const tx=s.x-Math.cos(ang)*s.len,ty=s.y-Math.sin(ang)*s.len;
    const grad=tctx.createLinearGradient(s.x,s.y,tx,ty);
    grad.addColorStop(0,`rgba(255,255,255,${0.95*fade})`);
    grad.addColorStop(0.4,`rgba(200,220,255,${0.4*fade})`);
    grad.addColorStop(1,'rgba(200,220,255,0)');
    tctx.strokeStyle=grad;tctx.lineWidth=1.6;tctx.lineCap='round';
    tctx.beginPath();tctx.moveTo(s.x,s.y);tctx.lineTo(tx,ty);tctx.stroke();
    tctx.fillStyle=`rgba(255,255,255,${fade})`;
    tctx.beginPath();tctx.arc(s.x,s.y,1.6,0,Math.PI*2);tctx.fill();
  });
}

let rotX=.32,rotY=0,frame=0;
let ptrDown=false,ptrX=0,ptrY=0,startRotX=0,startRotY=0,moved=false,ptrDownTime=0;
let hits=[];

const scache={};
function makeSphere(id,r,bands){
  if(scache[id])return scache[id];
  const sz=Math.max(40,Math.ceil(r*8));
  const oc=document.createElement('canvas');oc.width=oc.height=sz;
  const ox=oc.getContext('2d');const cr=sz/2;
  const bw=sz/bands.length;
  bands.forEach((col,i)=>{ox.fillStyle=col;ox.fillRect(0,i*bw,sz,bw+1);});
  const img=ox.getImageData(0,0,sz,sz);const d=img.data;
  for(let py=0;py<sz;py++)for(let px=0;px<sz;px++){
    const dx=px-cr,dy=py-cr,dist=Math.sqrt(dx*dx+dy*dy);
    const idx=(py*sz+px)*4;
    if(dist>cr-.5){d[idx+3]=0;continue;}
    const nx=dx/cr,ny=dy/cr,nz=Math.sqrt(Math.max(0,1-nx*nx-ny*ny));
    const diff=Math.max(0,-nx*.4-ny*.5+nz*.8);
    const bright=Math.min(1,.18+diff*.85),spec=Math.pow(Math.max(0,diff),16)*.4;
    d[idx]=Math.min(255,d[idx]*bright+255*spec);
    d[idx+1]=Math.min(255,d[idx+1]*bright+255*spec*.8);
    d[idx+2]=Math.min(255,d[idx+2]*bright+255*spec*.6);
  }
  ox.putImageData(img,0,0);scache[id]=oc;return oc;
}

function drawSphere(tctx,id,bands,cx,cy,r){
  const tex=makeSphere(id,r,bands);
  tctx.save();tctx.beginPath();tctx.arc(cx,cy,r,0,Math.PI*2);tctx.clip();
  tctx.drawImage(tex,cx-r-1,cy-r-1,r*2+2,r*2+2);tctx.restore();
  tctx.save();tctx.beginPath();tctx.arc(cx,cy,r+.5,0,Math.PI*2);tctx.clip();
  const shd=tctx.createLinearGradient(cx-r,cy,cx+r,cy);
  shd.addColorStop(0,'rgba(0,0,0,0)');shd.addColorStop(.5,'rgba(0,0,0,0)');shd.addColorStop(1,'rgba(0,0,12,.75)');
  tctx.fillStyle=shd;tctx.fillRect(cx-r,cy-r,r*2,r*2);tctx.restore();
  const spc=tctx.createRadialGradient(cx-r*.3,cy-r*.35,0,cx,cy,r);
  spc.addColorStop(0,'rgba(255,255,255,.22)');spc.addColorStop(.4,'rgba(255,255,255,.04)');spc.addColorStop(1,'rgba(0,0,0,0)');
  tctx.fillStyle=spc;tctx.beginPath();tctx.arc(cx,cy,r,0,Math.PI*2);tctx.fill();
}

function drawSun(tctx,cx,cy,r){
  const corona=tctx.createRadialGradient(cx,cy,r*.8,cx,cy,r*3.2);
  corona.addColorStop(0,'rgba(255,180,0,.18)');corona.addColorStop(.5,'rgba(255,100,0,.05)');corona.addColorStop(1,'rgba(0,0,0,0)');
  tctx.fillStyle=corona;tctx.beginPath();tctx.arc(cx,cy,r*3.2,0,Math.PI*2);tctx.fill();
  const sg=tctx.createRadialGradient(cx-r*.25,cy-r*.2,0,cx,cy,r);
  sg.addColorStop(0,'#fff9e0');sg.addColorStop(.15,'#ffe560');sg.addColorStop(.5,'#ffa500');sg.addColorStop(.8,'#ff6000');sg.addColorStop(1,'rgba(200,40,0,.8)');
  tctx.fillStyle=sg;tctx.beginPath();tctx.arc(cx,cy,r,0,Math.PI*2);tctx.fill();
}

function drawStar(tctx,cx,cy,r,core,halo){
  const h=tctx.createRadialGradient(cx,cy,0,cx,cy,r*9);
  h.addColorStop(0,halo);h.addColorStop(1,'rgba(0,0,0,0)');
  tctx.fillStyle=h;tctx.beginPath();tctx.arc(cx,cy,r*9,0,Math.PI*2);tctx.fill();
  const ig=tctx.createRadialGradient(cx,cy,0,cx,cy,r*3);
  ig.addColorStop(0,'#fff');ig.addColorStop(.3,core);ig.addColorStop(1,'rgba(0,0,0,0)');
  tctx.fillStyle=ig;tctx.beginPath();tctx.arc(cx,cy,r*3,0,Math.PI*2);tctx.fill();
  tctx.fillStyle='#fff';tctx.beginPath();tctx.arc(cx,cy,r*.7,0,Math.PI*2);tctx.fill();
  tctx.strokeStyle='rgba(255,255,255,0.25)';tctx.lineWidth=.8;
  for(let a=0;a<4;a++){const ang=a*Math.PI/4;tctx.beginPath();tctx.moveTo(cx+Math.cos(ang)*r,cy+Math.sin(ang)*r);tctx.lineTo(cx+Math.cos(ang)*r*7,cy+Math.sin(ang)*r*7);tctx.stroke();}
}

function drawBlackHole(tctx,cx,cy,bhr){
  const outerGlow=tctx.createRadialGradient(cx,cy,bhr*1.1,cx,cy,bhr*4);
  outerGlow.addColorStop(0,'rgba(120,80,200,0.12)');
  outerGlow.addColorStop(0.4,'rgba(60,30,120,0.06)');
  outerGlow.addColorStop(1,'rgba(0,0,0,0)');
  tctx.fillStyle=outerGlow;tctx.beginPath();tctx.arc(cx,cy,bhr*4,0,Math.PI*2);tctx.fill();
  tctx.save();tctx.translate(cx,cy);
  for(let i=5;i>=0;i--){
    const rO=bhr*(1.35+i*0.24),rI=bhr*(1.1+i*0.18);
    const heat=i/5,alpha=0.10+heat*0.18;
    const rr=Math.round(255*Math.min(1,0.4+heat*0.6)),gg=Math.round(180*heat*heat),bb=Math.round(80*(1-heat));
    tctx.save();tctx.scale(1,0.28);
    tctx.beginPath();tctx.arc(0,0,rO,Math.PI,Math.PI*2,false);tctx.arc(0,0,rI,Math.PI*2,Math.PI,true);tctx.closePath();
    tctx.fillStyle=`rgba(${rr},${gg},${bb},${alpha})`;tctx.fill();tctx.restore();
  }
  const sing=tctx.createRadialGradient(-bhr*0.2,-bhr*0.15,0,0,0,bhr);
  sing.addColorStop(0,'#0a0010');sing.addColorStop(0.6,'#04000a');sing.addColorStop(1,'#000000');
  tctx.fillStyle=sing;tctx.beginPath();tctx.arc(0,0,bhr,0,Math.PI*2);tctx.fill();
  const pr=tctx.createRadialGradient(0,0,bhr*0.88,0,0,bhr*1.08);
  pr.addColorStop(0,'rgba(0,0,0,0)');pr.addColorStop(0.4,'rgba(255,200,120,0.55)');pr.addColorStop(0.7,'rgba(255,160,60,0.25)');pr.addColorStop(1,'rgba(0,0,0,0)');
  tctx.fillStyle=pr;tctx.beginPath();tctx.arc(0,0,bhr*1.08,0,Math.PI*2);tctx.fill();
  for(let i=0;i<6;i++){
    const rO=bhr*(1.35+i*0.24),rI=bhr*(1.1+i*0.18);
    const heat=(5-i)/5,alpha=0.12+heat*0.22;
    const rr=Math.round(255*Math.min(1,0.4+heat*0.6)),gg=Math.round(200*heat*heat),bb=Math.round(80*(1-heat));
    tctx.save();tctx.scale(1,0.28);
    tctx.beginPath();tctx.arc(0,0,rO,0,Math.PI,false);tctx.arc(0,0,rI,Math.PI,0,true);tctx.closePath();
    tctx.fillStyle=`rgba(${rr},${gg},${bb},${alpha})`;tctx.fill();tctx.restore();
  }
  tctx.restore();
}

function drawPillars(tctx,cx,cy,pw){
  tctx.save();tctx.translate(cx,cy);
  const nebGlow=tctx.createRadialGradient(0,0,0,0,0,65*pw);
  nebGlow.addColorStop(0,'rgba(60,30,80,0.22)');nebGlow.addColorStop(0.5,'rgba(30,20,60,0.12)');nebGlow.addColorStop(1,'rgba(0,0,0,0)');
  tctx.fillStyle=nebGlow;tctx.beginPath();tctx.arc(0,0,65*pw,0,Math.PI*2);tctx.fill();
  function pillar(x,baseY,topY,maxW,minW,cTop,cMid,cBase){
    tctx.save();
    const grad=tctx.createLinearGradient(x,topY,x,baseY);
    grad.addColorStop(0,cTop);grad.addColorStop(0.5,cMid);grad.addColorStop(1,cBase);
    tctx.beginPath();
    tctx.moveTo(x-minW,topY);
    tctx.bezierCurveTo(x-minW*1.3,topY+(baseY-topY)*0.35,x-maxW*1.1,topY+(baseY-topY)*0.65,x-maxW,baseY);
    tctx.lineTo(x+maxW,baseY);
    tctx.bezierCurveTo(x+maxW*1.1,topY+(baseY-topY)*0.65,x+minW*1.3,topY+(baseY-topY)*0.35,x+minW,topY);
    tctx.closePath();tctx.fillStyle=grad;tctx.fill();
    const tipG=tctx.createRadialGradient(x,topY+3*pw,0,x,topY+3*pw,10*pw);
    tipG.addColorStop(0,'rgba(255,240,200,0.35)');tipG.addColorStop(0.5,'rgba(200,160,255,0.12)');tipG.addColorStop(1,'rgba(0,0,0,0)');
    tctx.fillStyle=tipG;tctx.beginPath();tctx.arc(x,topY+3*pw,10*pw,0,Math.PI*2);tctx.fill();
    tctx.restore();
  }
  pillar(0,-44*pw,22*pw,12*pw,4*pw,'rgba(80,40,100,0.9)','rgba(120,60,140,0.85)','rgba(40,20,60,0.95)');
  pillar(-22*pw,-28*pw,20*pw,7*pw,3*pw,'rgba(70,35,90,0.88)','rgba(100,50,120,0.8)','rgba(35,18,55,0.92)');
  pillar(18*pw,-18*pw,18*pw,6*pw,2*pw,'rgba(65,30,85,0.82)','rgba(95,45,115,0.75)','rgba(30,15,50,0.88)');
  pillar(-34*pw,-12*pw,16*pw,4*pw,1.5*pw,'rgba(55,25,75,0.72)','rgba(80,40,100,0.65)','rgba(25,12,45,0.78)');
  for(let i=0;i<5;i++){
    const wx=(Math.random()-0.5)*55*pw,wy=(Math.random()-0.5)*44*pw,wr=(Math.random()*12+6)*pw;
    const wAlpha=0.03+Math.random()*0.05,hue=i%2===0?'180,120,255':'120,180,255';
    const wg=tctx.createRadialGradient(wx,wy,0,wx,wy,wr);
    wg.addColorStop(0,`rgba(${hue},${wAlpha})`);wg.addColorStop(1,'rgba(0,0,0,0)');
    tctx.fillStyle=wg;tctx.beginPath();tctx.arc(wx,wy,wr,0,Math.PI*2);tctx.fill();
  }
  tctx.restore();
}

// Calcula el factor de escala de órbitas para que la más grande (neptuno=170) quepa en el 42% del ancho mínimo de pantalla
function orbitScale(W,H){
  const minDim=Math.min(W,H);
  // queremos que neptuno (170 unidades) ocupe como máximo el 44% del radio de la pantalla
  return Math.min((minDim*0.44)/170, 1.0);
}

function proj(x3,y3,z3,cx,cy){
  const cX=Math.cos(rotX),sX=Math.sin(rotX),cY=Math.cos(rotY),sY=Math.sin(rotY);
  const rx=x3*cY+z3*sY,rz2=-x3*sY+z3*cY;
  const ry=y3*cX-rz2*sX,rz=y3*sX+rz2*cX;
  const fov=700;
  const sc=fov/(fov+rz+120);
  return{sx:cx+rx*sc,sy:cy+ry*sc,sc,rz};
}

function draw(){
  const W=cv.width,H=cv.height,cx=W/2,cy=H/2;
  const osc=orbitScale(W,H);         // escala de órbitas
  const sc=Math.min(W/680,1);        // escala visual de planetas/sol
  const sunR=Math.max(14,20*sc);     // radio real del sol en px

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#02020e';ctx.fillRect(0,0,W,H);
  const mw=ctx.createRadialGradient(W*.38,H*.5,0,W*.38,H*.5,W*.52);
  mw.addColorStop(0,'rgba(70,70,140,.05)');mw.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=mw;ctx.fillRect(0,0,W,H);

  BG.forEach(s=>{
    const tw=.75+Math.sin(frame*.025+s.ph)*.25;
    ctx.globalAlpha=s.a*tw;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.s,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
  drawShootingStars(ctx,W,H);

  // Agujero negro — tamaño fijo relativo a pantalla
  const bhx=BH.fx*W,bhy=BH.fy*H;
  const bhr=Math.max(10,14*sc);
  drawBlackHole(ctx,bhx,bhy,bhr);
  ctx.fillStyle='rgba(180,140,255,0.38)';
  ctx.font=`${Math.round(9*Math.max(sc,0.7))}px sans-serif`;
  ctx.fillText(BH.label,bhx+bhr*2.2,bhy-bhr*1.2);

  // Pilares de la Creación
  const pilx=PIL.fx*W,pily=PIL.fy*H;
  const pilScale=Math.max(0.55,sc*0.85);
  drawPillars(ctx,pilx,pily,pilScale);
  ctx.fillStyle='rgba(200,160,255,0.45)';
  ctx.font=`${Math.round(9*Math.max(sc,0.7))}px sans-serif`;
  ctx.fillText(PIL.label,pilx+32*pilScale,pily-38*pilScale);

  // Estrellas fijas
  NSTARS.forEach(s=>{
    const sx=s.fx*W,sy=s.fy*H,sr=s.size*Math.max(sc,0.7);
    drawStar(ctx,sx,sy,sr,s.core,s.halo);
    ctx.fillStyle='rgba(255,255,255,0.42)';
    ctx.font=`${Math.round(9*Math.max(sc,0.7))}px sans-serif`;
    ctx.fillText(s.label,sx+sr*1.8,sy+3);
  });

  // Construir planetas con órbitas escaladas
  const PLANETS=PLANET_DEF.map(p=>({...p, orbit:p.orbitBase*osc, r:Math.max(p.r*sc, p.r*0.55)}));

  const pdata=PLANETS.map(p=>{
    const ang=p.angle+frame*p.speed;
    const x3=Math.cos(ang)*p.orbit,z3=Math.sin(ang)*p.orbit*.38;
    return{p,pr:proj(x3,0,z3,cx,cy)};
  });

  // Órbitas
  ctx.globalAlpha=.13;ctx.strokeStyle='rgba(200,200,255,0.7)';ctx.lineWidth=.5;ctx.setLineDash([2,5]);
  PLANETS.forEach(p=>{
    ctx.beginPath();
    for(let i=0;i<=120;i++){
      const a=(i/120)*Math.PI*2;
      const op=proj(Math.cos(a)*p.orbit,0,Math.sin(a)*p.orbit*.38,cx,cy);
      i===0?ctx.moveTo(op.sx,op.sy):ctx.lineTo(op.sx,op.sy);
    }
    ctx.stroke();
  });
  ctx.setLineDash([]);ctx.globalAlpha=1;

  const sunRz=proj(0,0,0,cx,cy).rz;
  pdata.sort((a,b)=>b.pr.rz-a.pr.rz);

  hits=[
    {id:'sun',x:cx,y:cy,r:sunR*1.4},
    {id:'blackhole',x:bhx,y:bhy,r:bhr*2.5},
    {id:'pillars',x:pilx,y:pily,r:44*pilScale}
  ];

  let sunDrawn=false;
  const drawSunNow=()=>{
    drawSun(ctx,cx,cy,sunR);
    for(let i=0;i<8;i++){
      const a=(frame*.008+i*Math.PI*.25);
      const rx2=cx+Math.cos(a)*sunR*.55,ry2=cy+Math.sin(a)*sunR*.4;
      const sg2=ctx.createRadialGradient(rx2,ry2,0,rx2,ry2,sunR*.28);
      sg2.addColorStop(0,'rgba(255,240,100,.22)');sg2.addColorStop(1,'rgba(255,100,0,0)');
      ctx.fillStyle=sg2;ctx.beginPath();ctx.arc(rx2,ry2,sunR*.28,0,Math.PI*2);ctx.fill();
    }
  };

  pdata.forEach(({p,pr})=>{
    if(!sunDrawn&&pr.rz<sunRz){drawSunNow();sunDrawn=true;}
    const r2=p.r,sx=pr.sx,sy=pr.sy;

    // ANTI-OVERLAP: si el planeta está dentro del radio del sol, no dibujamos
    const distToSun=Math.hypot(sx-cx,sy-cy);
    if(distToSun < sunR+r2+2) return;

    if(p.id==='saturn'){
      [1.85,1.6,1.35,1.1].forEach((rf,ri)=>{
        ctx.globalAlpha=.12+ri*.03;ctx.strokeStyle=ri%2===0?'#c8a840':'#e0d080';ctx.lineWidth=r2*.4;
        ctx.beginPath();ctx.ellipse(sx,sy,r2*rf,r2*rf*.28,0,Math.PI*.98,Math.PI*2.02);ctx.stroke();
      });ctx.globalAlpha=1;
    }
    drawSphere(ctx,p.id,p.bands,sx,sy,r2);
    const atm=ctx.createRadialGradient(sx,sy,r2*.7,sx,sy,r2*1.5);
    const ac=p.id==='earth'?'rgba(100,160,255,.1)':p.id==='venus'?'rgba(220,180,80,.08)':'rgba(80,80,120,.05)';
    atm.addColorStop(0,'rgba(0,0,0,0)');atm.addColorStop(.7,ac);atm.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=atm;ctx.beginPath();ctx.arc(sx,sy,r2*1.5,0,Math.PI*2);ctx.fill();
    if(p.id==='saturn'){
      [1.1,1.35,1.6,1.85].forEach((rf,ri)=>{
        ctx.globalAlpha=.14+ri*.03;ctx.strokeStyle=ri%2===0?'#c8a840':'#e0d080';ctx.lineWidth=r2*.4;
        ctx.beginPath();ctx.ellipse(sx,sy,r2*rf,r2*rf*.28,0,-.1,.1+Math.PI);ctx.stroke();
      });ctx.globalAlpha=1;
    }
    hits.push({id:p.id,x:sx,y:sy,r:Math.max(r2+2,8)});
  });
  if(!sunDrawn)drawSunNow();
  NSTARS.forEach(s=>hits.push({id:s.id,x:s.fx*W,y:s.fy*H,r:s.size*2.5*Math.max(sc,0.7)+10}));
  frame++;requestAnimationFrame(draw);
}
draw();

function drawModalPreview(id){
  mcanvas.width=90;mcanvas.height=90;
  mctx.clearRect(0,0,90,90);
  mctx.fillStyle='#07071e';mctx.fillRect(0,0,90,90);
  const p=PLANET_DEF.find(x=>x.id===id);
  if(id==='sun'){drawSun(mctx,45,45,28);}
  else if(id==='star1'){drawStar(mctx,45,45,5,'#fffce0','rgba(255,252,180,0.3)');}
  else if(id==='star2'){drawStar(mctx,45,45,6,'#e8f8ff','rgba(200,230,255,0.3)');}
  else if(id==='star3'){drawStar(mctx,45,45,5,'#ff9966','rgba(255,120,60,0.3)');}
  else if(id==='blackhole'){drawBlackHole(mctx,45,45,18);}
  else if(id==='pillars'){
    mctx.save();
    const nebG=mctx.createRadialGradient(45,55,0,45,55,50);
    nebG.addColorStop(0,'rgba(60,30,80,0.22)');nebG.addColorStop(1,'rgba(0,0,0,0)');
    mctx.fillStyle=nebG;mctx.beginPath();mctx.arc(45,55,50,0,Math.PI*2);mctx.fill();
    mctx.restore();
    drawPillars(mctx,45,58,0.82);
  }
  else if(p){
    if(id==='saturn'){
      [1.85,1.6,1.35,1.1].forEach((rf,ri)=>{
        mctx.globalAlpha=.15+ri*.04;mctx.strokeStyle=ri%2===0?'#c8a840':'#e0d080';mctx.lineWidth=4;
        mctx.beginPath();mctx.ellipse(45,45,26*rf,26*rf*.28,0,Math.PI*.98,Math.PI*2.02);mctx.stroke();
      });mctx.globalAlpha=1;
    }
    drawSphere(mctx,p.id,p.bands,45,45,26);
    if(id==='saturn'){
      [1.1,1.35,1.6,1.85].forEach((rf,ri)=>{
        mctx.globalAlpha=.17+ri*.04;mctx.strokeStyle=ri%2===0?'#c8a840':'#e0d080';mctx.lineWidth=4;
        mctx.beginPath();mctx.ellipse(45,45,26*rf,26*rf*.28,0,-.1,.1+Math.PI);mctx.stroke();
      });mctx.globalAlpha=1;
    }
    const atm=mctx.createRadialGradient(45,45,20,45,45,36);
    const ac=id==='earth'?'rgba(100,160,255,.15)':id==='venus'?'rgba(220,180,80,.1)':'rgba(80,80,120,.07)';
    atm.addColorStop(0,'rgba(0,0,0,0)');atm.addColorStop(.7,ac);atm.addColorStop(1,'rgba(0,0,0,0)');
    mctx.fillStyle=atm;mctx.beginPath();mctx.arc(45,45,36,0,Math.PI*2);mctx.fill();
  }
}

function getPos(e){
  const r=cv.getBoundingClientRect();
  const src=e.touches?e.touches[0]:(e.changedTouches?e.changedTouches[0]:e);
  return{x:src.clientX-r.left,y:src.clientY-r.top};
}
function getHit(mx,my){for(const h of hits){if(Math.hypot(mx-h.x,my-h.y)<h.r)return h.id;}return null;}

cv.addEventListener('mousedown',e=>{const pos=getPos(e);ptrDown=true;moved=false;ptrX=pos.x;ptrY=pos.y;startRotX=rotX;startRotY=rotY;ptrDownTime=Date.now();});
document.addEventListener('mousemove',e=>{
  const r=cv.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;
  if(ptrDown){const dx=mx-ptrX,dy=my-ptrY;if(Math.abs(dx)>3||Math.abs(dy)>3){moved=true;tip.style.display='none';rotY=startRotY+dx*.007;rotX=Math.max(-.9,Math.min(1.1,startRotX+dy*.007));}}
  else{const hit=getHit(mx,my);if(hit&&DATA[hit]){tip.style.display='block';tip.style.left=mx+'px';tip.style.top=my+'px';tip.textContent=DATA[hit].name;cv.style.cursor='pointer';}else{tip.style.display='none';cv.style.cursor='grab';}}
});
document.addEventListener('mouseup',e=>{
  if(!moved&&Date.now()-ptrDownTime<300){const r=cv.getBoundingClientRect();const hit=getHit(e.clientX-r.left,e.clientY-r.top);if(hit&&DATA[hit])openModal(hit,DATA[hit]);}
  ptrDown=false;moved=false;
});
cv.addEventListener('touchstart',e=>{e.preventDefault();const pos=getPos(e);ptrDown=true;moved=false;ptrX=pos.x;ptrY=pos.y;startRotX=rotX;startRotY=rotY;ptrDownTime=Date.now();},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();const pos=getPos(e);if(!ptrDown)return;const dx=pos.x-ptrX,dy=pos.y-ptrY;if(Math.abs(dx)>5||Math.abs(dy)>5){moved=true;rotY=startRotY+dx*.007;rotX=Math.max(-.9,Math.min(1.1,startRotX+dy*.007));}},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();if(!moved&&Date.now()-ptrDownTime<300){const pos=getPos(e);const hit=getHit(pos.x,pos.y);if(hit&&DATA[hit])openModal(hit,DATA[hit]);}ptrDown=false;moved=false;},{passive:false});

function openModal(id,d){
  drawModalPreview(id);
  document.getElementById('mname').textContent=d.name;
  document.getElementById('mtype').textContent=d.type;
  document.getElementById('mpoem').textContent=d.poem;
  overlay.classList.add('on');
}
document.getElementById('mclose').addEventListener('click',()=>overlay.classList.remove('on'));
overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.classList.remove('on');});
</script>
